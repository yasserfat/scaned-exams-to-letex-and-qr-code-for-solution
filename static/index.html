<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>معالج الامتحانات</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f1f5f9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .card {
        background: white;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 580px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }

      h2 {
        font-size: 22px;
        color: #1e293b;
        margin-bottom: 8px;
      }
      p.subtitle {
        color: #64748b;
        font-size: 14px;
        margin-bottom: 28px;
      }

      #dropzone {
        border: 2px dashed #cbd5e1;
        border-radius: 12px;
        padding: 36px 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        color: #94a3b8;
        margin-bottom: 20px;
      }
      #dropzone:hover,
      #dropzone.hover {
        border-color: #2563eb;
        background: #eff6ff;
        color: #2563eb;
      }
      #dropzone .icon {
        font-size: 36px;
        margin-bottom: 8px;
      }
      #dropzone p {
        font-size: 14px;
      }

      #fileInfo {
        display: none;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 16px;
        font-size: 14px;
        color: #334155;
      }

      button {
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover:not(:disabled) {
        background: #1d4ed8;
      }
      button:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }

      /* Steps */
      #steps {
        display: none;
        margin-top: 24px;
      }

      .step {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid #f1f5f9;
        font-size: 14px;
        color: #64748b;
      }
      .step:last-child {
        border-bottom: none;
      }

      .step-icon {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        flex-shrink: 0;
        margin-top: 1px;
      }

      .step.waiting .step-icon {
        background: #e2e8f0;
        color: #94a3b8;
      }
      .step.active .step-icon {
        background: #fef9c3;
      }
      .step.done .step-icon {
        background: #dcfce7;
      }
      .step.failed .step-icon {
        background: #fee2e2;
      }

      .step.active {
        color: #854d0e;
      }
      .step.done {
        color: #166534;
      }
      .step.failed {
        color: #991b1b;
      }

      .step-text {
        flex: 1;
        line-height: 1.5;
      }
      .step-detail {
        font-size: 12px;
        color: #94a3b8;
        margin-top: 2px;
        font-family: monospace;
        direction: ltr;
        text-align: left;
      }
      .step.failed .step-detail {
        color: #f87171;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid #854d0e;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: inline-block;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #finalStatus {
        display: none;
        margin-top: 16px;
        padding: 14px;
        border-radius: 8px;
        font-size: 14px;
        text-align: center;
      }
      .success {
        background: #dcfce7;
        color: #166534;
        border: 1px solid #bbf7d0;
      }
      .error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }

      /* Debug log */
      #debugBox {
        display: none;
        margin-top: 16px;
        background: #0f172a;
        color: #94a3b8;
        border-radius: 8px;
        padding: 14px;
        font-family: monospace;
        font-size: 12px;
        direction: ltr;
        text-align: left;
        max-height: 200px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>🖨️ معالج الامتحانات الممسوحة</h2>
      <p class="subtitle">
        ارفع ملف PDF ممسوح ضوئياً وسيتم إنتاج نسخة نظيفة جاهزة للطباعة
      </p>

      <div id="dropzone">
        <div class="icon">📄</div>
        <p>اسحب ملف PDF هنا أو انقر للاختيار</p>
        <input type="file" id="pdfInput" accept=".pdf" style="display: none" />
      </div>

      <div id="fileInfo">📎 <span id="fileName"></span></div>

      <button id="processBtn" disabled>معالجة الامتحان</button>

      <!-- Step indicators -->
      <div id="steps">
        <div class="step waiting" id="step1">
          <div class="step-icon">1</div>
          <div class="step-text">
            استخراج البيانات (المادة، السنة، المدة)
            <div class="step-detail" id="step1-detail"></div>
          </div>
        </div>
        <div class="step waiting" id="step2">
          <div class="step-icon">2</div>
          <div class="step-text">
            استخراج أسئلة الامتحان
            <div class="step-detail" id="step2-detail"></div>
          </div>
        </div>
        <div class="step waiting" id="step3">
          <div class="step-icon">3</div>
          <div class="step-text">
            استخراج التصحيح النموذجي
            <div class="step-detail" id="step3-detail"></div>
          </div>
        </div>
        <div class="step waiting" id="step4">
          <div class="step-icon">4</div>
          <div class="step-text">
            تحويل LaTeX إلى PDF
            <div class="step-detail" id="step4-detail"></div>
          </div>
        </div>
        <div class="step waiting" id="step5">
          <div class="step-icon">5</div>
          <div class="step-text">
            تحميل الملف النهائي
            <div class="step-detail" id="step5-detail"></div>
          </div>
        </div>
      </div>

      <div id="finalStatus"></div>
      <div id="debugBox"></div>
    </div>

    <script>
      const dropzone = document.getElementById("dropzone");
      const input = document.getElementById("pdfInput");
      const btn = document.getElementById("processBtn");
      const fileInfo = document.getElementById("fileInfo");
      const fileName = document.getElementById("fileName");
      const stepsDiv = document.getElementById("steps");
      const finalStatus = document.getElementById("finalStatus");
      const debugBox = document.getElementById("debugBox");
      let selectedFile = null;

      dropzone.onclick = () => input.click();
      dropzone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropzone.classList.add("hover");
      });
      dropzone.addEventListener("dragleave", () =>
        dropzone.classList.remove("hover"),
      );
      dropzone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropzone.classList.remove("hover");
        setFile(e.dataTransfer.files[0]);
      });
      input.addEventListener("change", () => setFile(input.files[0]));

      function setFile(file) {
        if (!file || !file.name.toLowerCase().endsWith(".pdf"))
          return alert("الرجاء اختيار ملف PDF فقط");
        selectedFile = file;
        fileName.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
        fileInfo.style.display = "block";
        btn.disabled = false;
        finalStatus.style.display = "none";
        stepsDiv.style.display = "none";
        debugBox.style.display = "none";
      }

      function setStep(id, state, detail = "") {
        const el = document.getElementById(id);
        const iconEl = el.querySelector(".step-icon");
        const detailEl = el.querySelector(".step-detail");
        el.className = `step ${state}`;
        detailEl.textContent = detail;
        if (state === "active")
          iconEl.innerHTML = '<span class="spinner"></span>';
        if (state === "done") iconEl.textContent = "✓";
        if (state === "failed") iconEl.textContent = "✗";
        if (state === "waiting") iconEl.textContent = el.id.replace("step", "");
      }

      function showFinal(msg, type) {
        finalStatus.innerHTML = msg;
        finalStatus.className = type;
        finalStatus.style.display = "block";
      }

      function log(msg) {
        debugBox.style.display = "block";
        debugBox.textContent += msg + "\n";
        debugBox.scrollTop = debugBox.scrollHeight;
      }

      btn.addEventListener("click", async () => {
        if (!selectedFile) return;

        btn.disabled = true;
        finalStatus.style.display = "none";
        debugBox.textContent = "";
        stepsDiv.style.display = "block";

        // Reset all steps
        ["step1", "step2", "step3", "step4"].forEach((s) =>
          setStep(s, "waiting"),
        );

        log(
          `[${new Date().toLocaleTimeString()}] Starting: ${selectedFile.name}`,
        );

        // Step 1
        setStep("step1", "active", "جاري الرفع...");
        log("[1/4] Uploading PDF to server...");

        const formData = new FormData();
        formData.append("file", selectedFile);

        let response;
        try {
          const startTime = Date.now();
          response = await fetch("/process", {
            method: "POST",
            body: formData,
          });
          const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

          setStep("step1", "done", `تم الإرسال`);
          setStep("step2", "done", `استخرج Claude المحتوى`);
          setStep("step3", "active", "جاري التحويل...");
          log(
            `[1-3] Server responded in ${elapsed}s — status: ${response.status}`,
          );
        } catch (e) {
          setStep("step1", "failed", e.message);
          log(`[ERROR] Network error: ${e.message}`);
          showFinal(
            "❌ تعذر الاتصال بالخادم. تأكد أن السيرفر يعمل على المنفذ 8000.",
            "error",
          );
          btn.disabled = false;
          return;
        }

        const contentType = response.headers.get("content-type") || "";
        log(`[INFO] Response content-type: ${contentType}`);
        log(`[INFO] Response status: ${response.status}`);

        if (response.ok && contentType.includes("application/pdf")) {
          const blob = await response.blob();
          log(`[INFO] PDF blob size: ${(blob.size / 1024).toFixed(1)} KB`);

          if (blob.size < 1000) {
            setStep("step3", "failed", "PDF فارغ أو تالف");
            log(
              `[ERROR] PDF too small (${blob.size} bytes) — likely a compile error`,
            );
            showFinal("❌ الملف الناتج تالف. راجع سجل التشخيص أدناه.", "error");
            btn.disabled = false;
            return;
          }

          setStep("step3", "done", "تم التحويل بنجاح");
          setStep("step4", "active", "جاري التحميل...");

          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = selectedFile.name.replace(/\.pdf$/i, "_clean.pdf");
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

          setStep("step4", "done", "تم التحميل");
          log(`[✅] Done! File downloaded.`);
          showFinal("✅ تم بنجاح! جاري تحميل الملف النظيف.", "success");
        } else {
          setStep("step3", "failed");
          let errMsg = "خطأ غير معروف";
          let details = "";
          let texFile = "";

          try {
            const err = await response.json();
            errMsg = err.error || errMsg;
            details = err.details || "";
            texFile = err.tex_file || "";
            log(`[ERROR] Step: ${err.step}`);
            log(`[ERROR] Message: ${err.error}`);
            if (details) log(`[ERROR] Details:\n${details}`);
            if (texFile) log(`[INFO] .tex file saved at: ${texFile}`);
          } catch (e) {
            log(`[ERROR] Could not parse error response`);
          }

          showFinal(
            `❌ فشل التحويل: ${errMsg}` +
              (texFile
                ? `<br><small style="direction:ltr;display:block;margin-top:6px">📁 ${texFile}</small>`
                : ""),
            "error",
          );
        }

        btn.disabled = false;
      });
    </script>
  </body>
</html>
